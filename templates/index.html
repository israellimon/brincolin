<!DOCTYPE html>
<html>
<head>
    <title>Control Brincolín</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .big-timer {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .finished {
            background-color: #ffdddd !important;
        }
    </style>
</head>
<body>

<div class="container py-3">

    <h3 class="text-center mb-3">🎪 Brincolín</h3>

    <!-- FORMULARIO -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <form method="POST" id="startForm">

                <label class="form-label">Niños</label>
                <select name="num_children" class="form-select mb-3">
                    {% for i in range(1,11) %}
                    <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>

                <label class="form-label">Tiempo</label>
                <select name="blocks" class="form-select mb-3">
                    <option value="1">15 min</option>
                    <option value="2">30 min</option>
                    <option value="3">45 min</option>
                    <option value="4">60 min</option>
                </select>

                <button class="btn btn-success w-100 btn-lg">
                    Iniciar (niño nuevo)
                </button>

            </form>
        </div>
    </div>

    <!-- ACTIVOS -->
    <h5 class="mb-3">Activos</h5>

    {% for ride in rides %}
    <div class="card shadow-sm mb-3" id="card-{{ride.id}}">
        <div class="card-body">

            <div class="d-flex justify-content-between">
                <h5>{{ ride.num_children }} niños</h5>
                <span class="badge bg-primary">
                    ${{ ride.total_amount }}
                </span>
            </div>

            <small>
                ⬆ {{ ride.start_time.strftime("%H:%M:%S") }} |
                ⬇ {{ ride.end_time.strftime("%H:%M:%S") }}
            </small>

            <div class="big-timer mt-2"
                 id="timer-{{ride.id}}"
                 data-end="{{ride.end_time}}">
            </div>

        </div>
    </div>
    {% else %}
        <p class="text-muted">No hay niños activos</p>
    {% endfor %}

</div>

<audio id="alarmSound">
    <source src="{{ url_for('static', filename='alarm.mp3') }}" type="audio/mpeg">
</audio>

<script>
let soundEnabled = false;
let alarmPlayed = {}; // evita múltiples alarmas por tarjeta

// Activar audio cuando el usuario presione iniciar
document.getElementById("startForm").addEventListener("submit", function() {
    let audio = document.getElementById("alarmSound");

    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        soundEnabled = true;
    }).catch(() => {});
});

setInterval(function() {

    let now = new Date();

    document.querySelectorAll("[id^='timer-']").forEach(function(el) {

        let rideId = el.id.split("-")[1];
        let end = new Date(el.dataset.end);
        let diff = Math.floor((end - now) / 1000);
        let card = document.getElementById("card-" + rideId);

        if (diff <= 0) {

            el.innerHTML = "⏰ Tiempo terminado";
            el.style.color = "red";
            card.classList.add("finished");

            if (soundEnabled && !alarmPlayed[rideId]) {
                document.getElementById("alarmSound").play();
                alarmPlayed[rideId] = true;
            }

        } else {

            if (diff <= 180) { // últimos 3 minutos
                card.style.backgroundColor = "#fff3cd";
            }

            let minutes = Math.floor(diff / 60);
            let seconds = diff % 60;

            el.innerHTML = minutes + "m " + seconds + "s";
        }

    });

}, 1000);
</script>

</body>
</html>
